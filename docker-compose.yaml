services:
  bookme:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_GH_REF: ${LB_RELEASE}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      - LB_APP_TITLE=LibreBooking
      - LB_DATABASE_HOSTSPEC=db
      - LB_DATABASE_USER=librebooking
      - LB_DATABASE_PASSWORD=devpass
      - LB_DATABASE_NAME=librebooking
      - LB_ENV=development
      - TZ=UTC
      - LB_INSTALL_PASSWORD=secret
      - LB_SCRIPT_URL=http://localhost/Web
    env_file:
      - .env
    restart: "unless-stopped"
  db:
    image: mariadb:12.0.2
    environment:
      - MYSQL_DATABASE=librebooking
      - MYSQL_ROOT_PASSWORD=devpass
      - MYSQL_USER=librebooking
      - MYSQL_PASSWORD=devpass
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: "unless-stopped"
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/mariadb-admin",
          "ping",
          "--socket=/run/mysqld/mysqld.sock",
          "-uroot",
          "-p'devpass'"
        ]
      interval: 2s
      timeout: 5s
      retries: 2


  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: devpass
    ports:
      - "8081:80"
    depends_on:
      db:
        condition: service_healthy
    restart: "unless-stopped"
